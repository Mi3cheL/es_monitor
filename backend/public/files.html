<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>NETLAB - ES MONITOR</title>

<style>
:root {
    --bg: #0f1115;
    --card: #1a1d23;
    --border: #262b33;
    --text: #e6e6e6;
    --muted: #9aa4b2;
    --accent: #3b82f6;
    --danger: #ef4444;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
}

header {
    padding: 20px 30px;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 1px;
}

.content-wrapper {
    margin-top: 90px;
}

.container {
    padding: 20px 30px 40px 30px;
    display: grid;
    grid-template-rows: auto auto 1fr;
    gap: 25px;
}

.topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 25px;
    z-index: 1000;
    border-bottom: 1px solid #222;
}

.topbar-left {
    display: flex;
    align-items: center;
}

.topbar-right {
    display: flex;
    align-items: center;
    gap: 25px;
}

.topbar a {
    color: #e6e6e6;
    text-decoration: none;
    font-weight: 600;
}

.topbar a:hover {
    opacity: 0.8;
}

.upload-card {
    background: var(--card);
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 60px;
    text-align: center;
    transition: 0.2s;
    cursor: pointer;
}

.upload-card:hover,
.upload-card.dragover {
    border-color: var(--accent);
    background: #20242c;
}

.upload-title {
    font-size: 18px;
    margin-bottom: 10px;
}

.upload-sub {
    font-size: 14px;
    color: var(--muted);
}

.upload-status {
    margin-top: 15px;
    font-size: 14px;
    color: var(--muted);
}

.upload-status.success { color: #22c55e; }
.upload-status.error { color: var(--danger); }

.spinner {
    margin: 15px auto 0 auto;
    width: 28px;
    height: 28px;
    border: 3px solid #2a303a;
    border-top: 3px solid var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.bottom {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 25px;
}

.card {
    background: var(--card);
    border-radius: 14px;
    padding: 20px;
}

.card-title {
    font-size: 16px;
    margin-bottom: 15px;
}

.item {
    padding: 12px;
    border-radius: 8px;
    background: #222732;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.2s;
}

.item:hover { background: #2a303a; }

.item.active {
    border: 1px solid var(--accent);
}

.badge {
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--accent);
    margin-left: 8px;
}

button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    margin-left: 10px;
    font-size: 13px;
}

button:hover { color: var(--text); }

.disk-value {
    font-size: 28px;
    margin-bottom: 15px;
}

.progress {
    height: 10px;
    background: #222732;
    border-radius: 6px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: 0.3s;
}

.disk-info {
    font-size: 13px;
    color: var(--muted);
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="topbar">

    <div class="topbar-left">
        <img src="/static/logo.png" alt="Logo" style="height:40px;">
    </div>

    <div class="topbar-right">
        <a href="/admin">Admin Panel</a>
        <a href="/logout">Logout</a>
    </div>

</div>

<div class="content-wrapper">

<div class="container">

    <div id="uploadCard" class="upload-card">
        <div class="upload-title">Drag the .pptx file here</div>
        <div class="upload-sub">or click to select</div>
        <input type="file" id="fileInput" hidden accept=".pptx">
        <div id="uploadStatus" class="upload-status"></div>
        <div id="uploadSpinner" class="spinner" style="display:none;"></div>
    </div>

    <div class="bottom">

        <div class="card">
            <div class="card-title">Presentations</div>
            <div id="items"></div>
        </div>

        <div class="card">
            <div class="card-title">Disk usage</div>
            <div class="disk-value" id="diskPercent">0%</div>
            <div class="progress">
                <div class="progress-bar" id="diskBar"></div>
            </div>
            <div class="disk-info" id="diskInfo">0 GB / 0 GB</div>
        </div>

    </div>

</div>
</div>

<script>

const uploadCard = document.getElementById("uploadCard");
const fileInput = document.getElementById("fileInput");
const itemsContainer = document.getElementById("items");

uploadCard.onclick = () => fileInput.click();

uploadCard.addEventListener("dragover", e => {
    e.preventDefault();
    uploadCard.classList.add("dragover");
});

uploadCard.addEventListener("dragleave", () => {
    uploadCard.classList.remove("dragover");
});

uploadCard.addEventListener("drop", e => {
    e.preventDefault();
    uploadCard.classList.remove("dragover");
    if (e.dataTransfer.files.length) {
        uploadFile(e.dataTransfer.files[0]);
    }
});

fileInput.addEventListener("change", () => {
    if (fileInput.files.length) {
        uploadFile(fileInput.files[0]);
    }
});

async function uploadFile(file) {

    const status = document.getElementById("uploadStatus");
    const spinner = document.getElementById("uploadSpinner");

    if (!file.name.endsWith(".pptx")) {
        status.className = "upload-status error";
        status.innerText = "Only files .pptx";
        return;
    }

    status.className = "upload-status";
    status.innerText = "Uploading and converting presentations...";
    spinner.style.display = "block";
    uploadCard.style.pointerEvents = "none";

    const formData = new FormData();
    formData.append("file", file);

    try {
        const response = await fetch("/upload/pptx", {
            method: "POST",
            body: formData
        });

        if (!response.ok) throw new Error();

        status.className = "upload-status success";
        status.innerText = "Presentation has been added successfully";

        loadItems();
        loadDisk();

    } catch {
        status.className = "upload-status error";
        status.innerText = "Error while uploading presentation";
    } finally {
        spinner.style.display = "none";
        uploadCard.style.pointerEvents = "auto";

        setTimeout(() => {
            status.innerText = "";
        }, 4000);
    }
}

async function loadItems() {
    try {
        const r = await fetch("/api/items");
        if (!r.ok) return;

        const items = await r.json();
        itemsContainer.innerHTML = "";

        items.forEach(item => {

            const div = document.createElement("div");
            div.className = "item" + (item.active ? " active" : "");

            let actions = "";

            if (!item.active) {
                actions += `<button onclick="activate('${item.id}')">Activate</button>`;
            }

            actions += `<button onclick="downloadItem('${item.id}')">Download</button>`;
            actions += `<button onclick="removeItem('${item.id}')">Delete</button>`;

            div.innerHTML = `
                <div>
                    ${item.name} (${item.slides} slides)
                    ${item.active ? '<span class="badge">ACTIVE</span>' : ''}
                </div>
                <div>
                    ${actions}
                </div>
            `;

            itemsContainer.appendChild(div);
        });

    } catch (e) {
        console.log("Items API error", e);
    }
}

async function activate(id) {
    await fetch("/api/items/" + id + "/activate", { method: "POST" });
    loadItems();
}

async function removeItem(id) {

    const confirmed = confirm("Are you sure you want to delete this presentation?");
    if (!confirmed) return;

    await fetch("/api/items/" + id, { method: "DELETE" });
    loadItems();
    loadDisk();
}

function downloadItem(id) {
    window.location.href = "/api/items/" + id + "/download";
}

async function loadDisk() {
    try {
        const r = await fetch("/api/disk");
        if (!r.ok) return;

        const data = await r.json();

        const percent = parseFloat(data.percent).toFixed(1);
        const used = (data.used / (1024 * 1024 * 1024)).toFixed(2);
        const total = (data.total / (1024 * 1024 * 1024)).toFixed(2);

        document.getElementById("diskPercent").innerText = percent + "%";
        document.getElementById("diskBar").style.width = percent + "%";
        document.getElementById("diskInfo").innerText =
            used + " GB / " + total + " GB";

    } catch (e) {
        console.log("Disk API error", e);
    }
}

loadItems();
loadDisk();

setInterval(loadDisk, 15000);
setInterval(loadItems, 10000);

</script>

</body>
</html>
