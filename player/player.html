<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Player</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    #slide {
      width: 100vw;
      height: 100vh;
      object-fit: contain; /* zmień na 'cover' jeśli chcesz wypełniać cały ekran kosztem przycięcia */
      display: block;
    }
  </style>
</head>
<body>
  <img id="slide" alt="slide" />
  <script>
    const SLIDES_URL = "http://127.0.0.1:8080/active/slides";
    const SLIDE_DURATION_MS = 30000; // Czas wyświetlania jednego slajdu (ms)

    let slides = [];
    let idx = 0;

    async function loadSlides() {
      const res = await fetch(SLIDES_URL, { cache: "no-store" });
      if (!res.ok) throw new Error("Cannot load slides list");
      slides = await res.json();
      idx = 0;
    }

    function showSlide() {
      if (!slides.length) return;
      const img = document.getElementById("slide");
      const url = slides[idx] + "?t=" + Date.now(); // cache-bust
      img.src = url;
      idx = (idx + 1) % slides.length;
    }

    async function tick() {
      try {
        await loadSlides();
        showSlide();
        setInterval(showSlide, SLIDE_DURATION_MS);
      } catch (e) {
        console.error(e);
      }
    }

    tick();
  </script>
</body>
</html>
